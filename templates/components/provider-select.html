<!-- 
  AI 引擎選單組件 (Provider Selector Component)
  選擇要使用的 AI 分析引擎
-->
<select id="provider-select" class="provider-select-component" style="
    background: rgba(30, 34, 39, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #fff;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    min-width: 120px;
" data-provider="auto">
    <option value="auto">⚙️ Auto</option>
    <option value="gemini">✨ Gemini</option>
    <option value="nvidia">⚡ NVIDIA</option>
    <option value="rule">📋 規則引擎</option>
</select>
