<!-- Step 1: 實時偵察情報網 Panel Component -->
<section class="panel" id="intelligence-panel" style="display: flex; flex-direction: column; overflow: hidden;">
    <div class="panel-header">
        <h2 class="panel-title"><i class="fas fa-broadcast-tower"></i> <span style="color: var(--accent-blue); margin-right: 5px;">Step 1</span> 實時偵察情報網</h2>
        <span id="news-count" class="count-badge">- 則偵察</span>
    </div>
    
    <div class="scroll-wrapper" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column;">
        <!-- 偵察對象狀態列 (可展開/收合) -->
        <div id="recon-footer" style="
            background: rgba(0, 210, 255, 0.05);
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
            padding: 8px 12px;
            cursor: pointer;
            flex-shrink: 0;
        " onclick="toggleReconFooter()">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 11px; color: var(--accent-blue);">
                    <i class="fas fa-tasks"></i> 偵察對象：<span id="recon-complete-count">-</span>/13 完成
                </span>
                <span id="recon-toggle-icon" style="color: var(--accent-blue); font-size: 10px;">
                    <i class="fas fa-chevron-up"></i>
                </span>
            </div>
            <div id="recon-sources" style="
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-top: 10px;
                padding-top: 10px;
                border-top: 1px solid rgba(0, 210, 255, 0.1);
            ">
                <span class="stat-item" id="src-ptt" title="PTT 股版"><i class="fab fa-python"></i> PTT <span class="status">○</span></span>
                <span class="stat-item" id="src-anue" title="鉅亨網"><i class="fas fa-newspaper"></i> 鉅亨 <span class="status">○</span></span>
                <span class="stat-item" id="src-yahoo" title="Yahoo 股市"><i class="fas fa-chart-line"></i> Yahoo <span class="status">○</span></span>
                <span class="stat-item" id="src-udn" title="經濟日報"><i class="fas fa-book"></i> UDN <span class="status">○</span></span>
                <span class="stat-item" id="src-moneydj" title="MoneyDJ"><i class="fas fa-dollar-sign"></i> MoneyDJ <span class="status">○</span></span>
                <span class="stat-item" id="src-ctee" title="工商時報"><i class="fas fa-newspaper"></i> 工商 <span class="status">○</span></span>
                <span class="stat-item" id="src-tianxia" title="天下雜誌"><i class="fas fa-globe"></i> 天下 <span class="status">○</span></span>
                <span class="stat-item" id="src-caixin" title="財訊"><i class="fas fa-chart-pie"></i> 財訊 <span class="status">○</span></span>
                <span class="stat-item" id="src-cmoney" title="CMoney"><i class="fas fa-coins"></i> CMoney <span class="status">○</span></span>
                <span class="stat-item" id="src-ettoday" title="東森新聞"><i class="fas fa-tv"></i> 東森 <span class="status">○</span></span>
                <span class="stat-item" id="src-tvbs" title="TVBS"><i class="fas fa-news"></i> TVBS <span class="status">○</span></span>
                <span class="stat-item" id="src-cna" title="中央社"><i class="fas fa-broadcast-tower"></i> 中央社 <span class="status">○</span></span>
                <span class="stat-item" id="src-wantgoo" title="玩股網"><i class="fas fa-search-plus"></i> 玩股 <span class="status">○</span></span>
            </div>
        </div>
        
        <!-- 新聞內容區 -->
        <div class="feed-content" id="intelligence-feed" style="flex: 1; overflow-y: visible;">
            <div class="empty-state">
                <i class="fas fa-search"></i>
                <p>等待偵察數據導入...</p>
            </div>
        </div>

        <div style="padding: 10px 12px 0 12px; border-top: 1px solid rgba(255,255,255,0.06);">
            <div style="font-size: 11px; color: var(--accent-blue); margin-bottom: 8px;">
                <i class="fas fa-binoculars"></i> Step 1 偵察日誌
            </div>
            <div id="intelligence-log" style="
                min-height: 64px;
                max-height: 120px;
                overflow-y: auto;
                padding: 8px;
                border-radius: 8px;
                background: rgba(0, 0, 0, 0.22);
                border: 1px solid rgba(255,255,255,0.05);
                font-size: 11px;
                line-height: 1.5;
                color: #cfefff;
            ">
                <div class="log-entry system">等待 Step 1 偵察任務啟動。</div>
            </div>
        </div>
    </div>
</section>
