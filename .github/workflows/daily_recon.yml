name: DualBear Daily Recon 🐻🚀

# 1. 定義「點火」觸發條件
on:
  schedule:
    # 📅 每天台灣時間早上 08:30 自動執行 (Cron 語法是 UTC 時間 00:30)
    - cron: '30 0 * * *'
  # 允許手動從 GitHub 網頁介面觸發，方便測試
  workflow_dispatch:

jobs:
  recon_and_report:
    runs-on: ubuntu-latest # 在最新的 Linux 環境上運行
    
    # 2. 將 GitHub Secrets 從保險箱映射為環境變數
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }} # 若使用 Messaging API，這裡也是填 Access Token

    steps:
      # 3. 步驟一：拉取（Checkout）您的程式碼
      - name: 🚀 正在部署程式碼到雲端基地...
        uses: actions/checkout@v4

      # 4. 步驟二：安裝 Python 環境
      - name: 🐍 正在初始化 Python 環境...
        uses: actions/setup-python@v5
        with:
          python-python: '3.12' # 使用與您本地相近的 Python 版本

      # 5. 步驟三：安裝專案依賴套件 (這一步非常關鍵！)
      - name: 📦 正在安裝戰略依賴套件 (安裝 google-generativeai)...
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt # GitHub Actions 會讀取這個檔案來安裝所有需要的庫

      # 6. 步驟四：執行核心偵察腳本
      - name: 📡 哨兵點火！開始今日台股數據偵察...
        run: python master_script.py # 執行您的主程式
